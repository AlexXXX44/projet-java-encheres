<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil</title>
</head>
<body>
<h1>Profil de <span th:text="${utilisateur.nom}"></span></h1>

<p><strong>Email :</strong> <span th:text="${utilisateur.email}"></span></p>
<p><strong>Points disponibles :</strong> <span th:text="${utilisateur.points}"></span></p>

<hr/>

<h2>Mes enchères</h2>
<table border="1">
    <thead>
    <tr>
        <th>Article</th>
        <th>Montant</th>
        <th>Date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${mesEncheres}">
        <td th:text="${e.article.nom}"></td>
        <td th:text="${e.montant}"></td>
        <td th:text="${#temporals.format(e.dateEnchere, 'dd/MM/yyyy HH:mm')}"></td>
    </tr>
    </tbody>
</table>

<hr/>

<h2>Mes enchères gagnées</h2>
<table border="1">
    <thead>
    <tr>
        <th>Article</th>
        <th>Montant</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${mesEncheresGagnees}">
        <td th:text="${e.article.nom}"></td>
        <td th:text="${e.montant}"></td>
    </tr>
    </tbody>
</table>

<hr/>

<p><a th:href="@{/articles}">Retour aux articles</a></p>
<p><a th:href="@{/logout}">Se déconnecter</a></p>
