<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - ENI Enchères</title>
    <style>
        /* ... (tes styles CSS restent les mêmes) ... */
        /* Ajout d'un petit fix pour le centrage du titre */
        h2 { text-align: center; color: var(--primary); }
        .auth-footer { text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>

<header style="text-align: center; padding: 1rem;">
    <h1><a th:href="@{/}">ENI-Enchères</a></h1>
</header>

<main>
    <h2>Connexion</h2>

    <div th:if="${param.error}" class="error" style="text-align: center; margin-bottom: 1rem;">
        Identifiants invalides. Veuillez réessayer.
    </div>
    
    <div th:if="${param.logout}" style="color: #059669; text-align: center; margin-bottom: 1rem;">
        Vous avez été déconnecté avec succès.
    </div>

    <form th:action="@{/login}" method="post" id="inscription-form">
        <span>
            <div>
                <label for="username">Email ou Pseudo</label>
                <input type="text" id="username" name="username" placeholder="votre@email.com" required>
            </div>
        </span>
        
        <span>
            <div>
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
        </span>

        <button type="submit">Se connecter</button>
    </form>

    <div class="auth-footer">
        <p>Pas encore de compte ? <a th:href="@{/register}">Créer un compte</a></p>
    </div>
</main>

<footer style="text-align: center; margin-top: 2rem; color: var(--muted);">
    <p>&copy; 2026 ENI - Tous droits réservés</p>
</footer>

</body>
</html>
