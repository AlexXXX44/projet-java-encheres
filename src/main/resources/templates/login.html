<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <style>
        :root {
            --primary: #2c7be5;
            --danger: #d63031;
            --muted: #6b7280;
            --bg: #f7f9fc;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: #1f2937;
        }

        header a { text-decoration: none; color: inherit; }

        main {
            max-width: 960px;
            margin: 2rem auto;
            padding: 1.5rem;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(16, 24, 40, .06);
        }

        /* Grille du formulaire */
        form#inscription-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem 1.25rem;
        }
        /* Aplatit les wrappers <span> pour que la grille fonctionne */
        form#inscription-form > span { display: contents; }
        form#inscription-form > span > div {
            display: flex;
            flex-direction: column;
        }

        /* Libellés et champs */
        label {
            font-weight: 600;
            margin-bottom: .35rem;
            color: #111827;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: .6rem .75rem;
            border: 1px solid var(--border);
            border-radius: .5rem;
            background: #fff;
            color: #111827;
            transition: border-color .2s ease, box-shadow .2s ease, background-color .2s;
        }

        input::placeholder { color: #9aa4b2; }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 .2rem rgba(44, 123, 229, .15);
        }

        /* Messages d'aide et d'erreur */
        .commentaire {
            margin-top: .25rem;
            font-size: .85rem;
            color: var(--muted);
        }

        /* Vous aviez déjà .error : on la garde et on l'améliore légèrement */
        .error {
            color: var(--danger);
            font-style: italic;
            font-size: .85rem;
            margin-top: .35rem;
            display: block;
        }
        .error::before { content: "⚠ "; }

        /* Met en évidence le champ si une erreur est présente dans le même bloc (navigateurs récents) */
        div:has(> .error) input,
        div:has(> .error) select,
        div:has(> .error) textarea {
            border-color: var(--danger);
            background-color: #fff6f6;
        }

        /* Bouton principal */
        button[type="submit"] {
            grid-column: 1 / -1;
            margin-top: .5rem;
            padding: .75rem 1.25rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: .5rem;
            font-weight: 600;
            letter-spacing: .2px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(44, 123, 229, .25);
            transition: transform .08s ease, background-color .2s ease, box-shadow .2s ease;
        }
        button[type="submit"]:hover {
            background: #2569d8;
            box-shadow: 0 8px 24px rgba(44, 123, 229, .32);
        }
        button[type="submit"]:active {
            transform: translateY(1px);
            box-shadow: 0 6px 18px rgba(44, 123, 229, .35);
        }
        button[type="submit"]:disabled {
            background: #9aa4b2;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Indique visuellement les champs requis via le texte d'aide si présent */
        input[required] + .commentaire::after {
            content: " *";
            color: var(--danger);
        }

        /* Mode sombre (optionnel) */
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0b1020; --border: #253046; }
            main { background: #121a2a; color: #e5e7eb; border-color: var(--border); }
            input, select, textarea { background: #0f1524; border-color: var(--border); color: #f1f5f9; }
            input::placeholder { color: #8b9db5; }
            .commentaire { color: #9fb0c9; }
            .error { color: #ff8a8a; }
            button[type="submit"] { box-shadow: none; }
        }
    </style>
</head>
<body>
<header>
    <h1>
        <a href="/">ENI-Enchères</a>
    </h1>
</header>

<main>
    <p th:if="${param.error}" style="color:red">Identifiants invalides.</p>
    <!-- Message d'erreur si l'authentification échoue -->
    <div th:if="${param.error}">
        <p style="color: red;">Pseudo ou mot de passe incorrect.</p>
    </div>

    <!-- Message si l'utilisateur vient de se déconnecter -->
    <div th:if="${param.logout}">
        <p style="color: green;">Vous avez été déconnecté avec succès.</p>
    </div>

    <form th:action="@{/login}" method="post">
        <div>
            <label for="pseudo">Pseudo :</label>
            <input type="text" id="pseudo" name="pseudo" required>
        </div>
        <div>
            <label for="motDePasse">Mot de passe :</label>
            <input type="password" id="motDePasse" name="motDePasse" required>
        </div>
        <div>
            <button type="submit">Se connecter</button>
        </div>
    </form>

    <div>
        <label for="souvenir">Se souvenir de moi</label>
        <input type="checkbox" name="souvenir" id="souvenir">
        <a href="">Mot de passe oublié</a>
    </div>
    <div>
        <a href="/creer_compte">
            <button type="submit">Créer un compte</button></a>
    </div>

</main>
<footer>
    <p>&copy; ENI - Tous droits réservés</p>
</footer>
</body>
</html>
