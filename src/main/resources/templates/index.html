<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Accueil</title><!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="/js/rechercheFiltree.js"></script>
</head>

<header class="bg-dark text-white py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">
            <a href="/" class="text-white text-decoration-none">ENI-Enchères</a></h1>
        <nav id="nav-title">
            <a href="/creer_compte" class="btn btn-outline-light btn-sm me-2">S'inscrire</a>
            <div sec:authorize="isAuthenticated()" class="d-inline">
                <span class="me-2" sec:authentication="name"></span>
                <a href="/logout" class="btn btn-danger btn-sm">Se déconnecter</a>
                <div sec:authentication="name"></div>
                <div sec:authentication="principal.authorities"></div>
            </div>
            <span sec:authorize="!isAuthenticated()" class="d-inline">
                <a href="/login" class="btn btn-success btn-sm">Se connecter</a>
            </span>
        </nav>
    </div>
</header>

<main class="container">
    <h2 class="mb-4">Liste des enchères</h2>
    <!-- Formulaire de recherche -->
    <form class="row g-3 mb-4">
        <div class="col-md-6">
            <p>Filtres :</p>
            <input class="form-control" type="search" name="recherche" placeholder="Le nom de l'article contient"
                   title="Saisissez votre recherche">
        </div>
        <div>
            <button type="submit">Rechercher</button>
        </div>
        <div class="col-md-3">
            <label for="categorie">Catégorie :</label>
            <select class="form-select" name="categorie" id="categorie">
                <option value="toutes">Toutes</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.libelle}">
                </option>
            </select>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100">Rechercher</button>
            </div>
        </div>
    </form>

    <!-- Liste des articles -->
    <div class="row">
        <div th:each="article : ${articles}" class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <img src="/img/logo_site.jpg" class="card-img-top" alt="Image article">
                <div class="card-body">
                    <h5 class="card-title" th:object="${articleVendu}"></h5>>
                    <p class="card-text">
                        Prix : <span th:text="${article.prixVente}"></span> €<br>
                        Fin : <span th:text="${article.dateFinEncheres}"></span><br>
                        Catégorie : <span th:text="${article.categorie.libelle}"></span><br>
                        Vendeur : <span th:text="${article.utilisateur.pseudo}"></span>
                    </p>
                </div>
                <div class="card-footer text-center">
                    <a href="#" class="btn btn-outline-primary btn-sm">Voir détails</a>
                </div>
            </div>
        </div>
    </div>
</main>
<footer>
    <p>&copy; ENI - Tous droits réservés</p>
</footer>

</html>
