<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Accueil - ENI-Enchères</title>

    <!-- Bootstrap CSS (stable) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<header class="bg-dark text-white py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h1 class="h3 mb-0">
            <a href="/" class="text-white text-decoration-none">ENI-Enchères</a>
        </h1>

        <nav id="nav-title">
            <a href="/creer_compte" class="btn btn-outline-light btn-sm me-2">S'inscrire</a>

            <span sec:authorize="isAuthenticated()" class="me-2">
                <span sec:authentication="name"></span>
                <a href="/logout" class="btn btn-danger btn-sm ms-2">Se déconnecter</a>
            </span>

            <span sec:authorize="!isAuthenticated()">
                <a href="/login" class="btn btn-success btn-sm">Se connecter</a>
            </span>
        </nav>
    </div>
</header>

<main class="container">
    <h2 class="mb-4">Liste des enchères</h2>

    <!-- Formulaire de recherche (GET) -->
    <form method="get" action="/" class="row g-3 mb-4">
        <div class="col-md-6">
            <label>
                <input class="form-control" type="search" name="keyword" placeholder="Le nom de l'article contient"
                       th:value="${keyword}" />
            </label>
        </div>

        <div class="col-md-3">
            <label>
                <select class="form-select" name="categorieId">
<!--                    <option th:value="" th:selected="${categorieId == null}">Toutes catégories</option>-->
                    <option th:each="c : ${categories}"
                            th:text="${c.libelle}"></option>
                    <!--                            th:value="${c.id}"-->
                    <!--                            th:selected="${c.id == categorieId}"-->
                </select>
            </label>
        </div>

        <div class="col-md-3">
            <button type="submit" class="btn btn-primary w-100">Rechercher</button>
        </div>
    </form>

    <!-- Résultats -->
    <div class="row">
        <div th:if="${#lists.isEmpty(articles)}" class="col-12">
            <div class="alert alert-info">Aucun article trouvé.</div>
        </div>
        <form method="get" action="/" class="mb-4">
            <label for="categorie">Filtrer par catégorie :</label>
            <select id="categorie" name="categorie" class="form-select w-auto d-inline-block">
                <option value="">Toutes</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.libelle}"
                        th:text="${cat.libelle}"
                        th:selected="${param.categorie == cat.libelle}">
                </option>
            </select>
            <button type="submit" class="btn btn-primary">Filtrer</button>
        </form>

        <div th:each="article : ${articles}" class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <img th:src="${'/img/logo_site.jpg'}" class="card-img-top" th:alt="${article.nomArticle}" />
<!--                <img th:src="${article.imageUrl != null ? article.imageUrl : '/img/logo_site.jpg'}"-->
<!--                     class="card-img-top" th:alt="${article.nomArticle}" />-->

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${article.nomArticle}">Nom</h5>
                    <p class="card-text" th:text="${article.description}">Description</p>

                    <ul class="list-unstyled mt-auto">
                        <li>Prix : <strong th:text="${article.prixVente + ' €'}">0 €</strong></li>
                        <li>Fin : <span th:text="${article.dateFinEncheres}">date</span></li>
                        <li>Catégorie : <span th:text="${article.categorie.libelle}">cat</span></li>
                        <li>Vendeur : <span th:text="${article.utilisateur.pseudo}">pseudo</span></li>
                    </ul>
                </div>

                <div class="card-footer text-center">
                    <a th:href="@{'/article/' + ${article.noArticle}}" class="btn btn-outline-primary btn-sm">Voir détails</a>
                </div>
            </div>
        </div>
    </div>
<!--    <div class="pagination">-->
<!--        <a th:href="@{/(page=${currentPage - 1}, size=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir})}"-->
<!--           th:if="${currentPage > 1}">Précédent</a>-->
<!--        <span>Page <span th:text="${currentPage}"></span></span>-->
<!--        <a th:href="@{/(page=${currentPage + 1}, size=${pageSize}, sortBy=${sortBy}, sortDir=${sortDir})}"-->
<!--           th:if="${articles.size() == pageSize}">Suivant</a>-->
<!--    </div>-->
    <div>
        <a th:href="@{/(page=${currentPage - 1}, size=${size})}" th:if="${currentPage > 1}">Précédent</a>
        <span>Page [[${currentPage}]]</span>
        <a th:href="@{/(page=${currentPage + 1}, size=${size})}">Suivant</a>
    </div>

</main>

<footer class="bg-dark text-white text-center py-3 mt-4">
    &copy; ENI - Tous droits réservés
</footer>

<!-- jQuery et Bootstrap JS (optionnel, pour composants) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/rechercheFiltree.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
